# Hand-labeled ResearchConcept pairs for threshold calibration (E-2 AC-12).
#
# Each entry is a pair of concept names (optionally with descriptions)
# labeled "same" if they should dedup or "different" if they should not.
# Names roughly mirror the scale of concept names we expect to extract
# from the corpus.
#
# Mix it up: close synonyms, near-synonyms, capitalization variants,
# parent/child concepts that should NOT merge, and entirely unrelated
# concepts. Aim for a balanced mix of same/different so F1 is meaningful.

- a: "attention mechanism"
  b: "self-attention"
  label: same

