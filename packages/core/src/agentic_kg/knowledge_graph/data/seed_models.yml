# Canonical Model seed for E-3.
#
# Each entry creates a Model node with ``is_canonical=True`` via
# ``load_seed_models()``. The loader is idempotent: rerunning against the
# same graph merges instead of creating duplicates. Canonical Models are
# write-protected during dedup: a non-canonical create call cannot rename
# them, but a canonical create call CAN promote a near-duplicate non-
# canonical node (see AC-3, Tech Lead Q1 review).
#
# v1 ships ~20 well-known models covering language / vision / multimodal /
# classical / graph families. Expansion to ~100 tracked as a follow-up.
# Adding entries lands via PR — the verify-time eval (AC-10) re-runs on
# each change to confirm the 0.95 threshold still clears precision +
# recall gates.

# =============================================================================
# Language models
# =============================================================================

- name: BERT
  description: Bidirectional Encoder Representations from Transformers; deep
    bidirectional language model trained on masked language modeling.
  aliases: [bert-base, bert-large]
  architecture: transformer
  model_type: language_model
  year_introduced: 2018
  introducing_paper_doi: 10.18653/v1/N19-1423

- name: GPT-2
  description: Generative Pre-trained Transformer 2; autoregressive language
    model from OpenAI.
  aliases: [gpt2]
  architecture: transformer
  model_type: language_model
  year_introduced: 2019

- name: GPT-3
  description: Generative Pre-trained Transformer 3; large autoregressive
    language model with 175B parameters.
  aliases: [gpt3]
  architecture: transformer
  model_type: language_model
  year_introduced: 2020

- name: GPT-4
  description: OpenAI's fourth-generation Generative Pre-trained Transformer
    with multimodal capabilities.
  aliases: [gpt4]
  architecture: transformer
  model_type: language_model
  year_introduced: 2023

- name: T5
