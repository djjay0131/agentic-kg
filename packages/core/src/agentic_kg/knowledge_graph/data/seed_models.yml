  model_type: language_model
  year_introduced: 2023

- name: Mistral
  description: Mistral AI's family of open-weight large language models.
  aliases: [mistral-7b, mistral-instruct]
  architecture: transformer
  model_type: language_model
  year_introduced: 2023

- name: Claude
  description: Anthropic's family of large language models.
  aliases: [claude-1, claude-2, claude-3]
