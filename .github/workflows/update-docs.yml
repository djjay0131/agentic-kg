name: Update Documentation Pages

on:
  push:
    branches:
      - master
    paths:
      - 'llm/memory_bank/**'
      - 'llm/features/**'
      - 'construction/sprints/**'
      - 'docs/**'
      - '.github/scripts/generate_site_data.py'
      - '.github/workflows/update-docs.yml'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force documentation update'
        required: false
        default: 'false'

concurrency:
  group: pages-production
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml "pydantic>=2"

      - name: Regenerate site data
        run: python .github/scripts/generate_site_data.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --strict_front_matter --trace

      - name: Validate HTML and links
        uses: chabad360/htmlproofer@master
        with:
          directory: docs/_site
          arguments: >-
            --disable-external
            --check-favicon
            --allow-hash-href
            --ignore-empty-alt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: deploy ${{ github.sha }}'
          keep_files: true  # preserve previews/ subtree from PR workflow
