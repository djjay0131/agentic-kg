name: Preview Documentation Pages

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'llm/memory_bank/**'
      - 'llm/features/**'
      - 'construction/sprints/**'
      - 'docs/**'
      - '.github/scripts/generate_site_data.py'
      - '.github/workflows/preview-docs.yml'

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml "pydantic>=2"

      - name: Regenerate site data
        run: python .github/scripts/generate_site_data.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site for preview
        working-directory: docs
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }}
        run: |
          bundle exec jekyll build \
            --baseurl "/agentic-kg/previews/pr-${{ github.event.pull_request.number }}" \
            --strict_front_matter \
            --trace

      - name: Validate HTML and links
        uses: chabad360/htmlproofer@master
        with:
          directory: docs/_site
          arguments: >-
            --disable-external
            --check-html
            --check-favicon
            --allow-hash-href
            --ignore-empty-alt

      - name: Publish preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs/_site
          preview-branch: gh-pages
          umbrella-dir: previews
          action: deploy

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          umbrella-dir: previews
          action: remove
